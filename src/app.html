<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover lets the map fill edge-to-edge AND makes the iOS
		     env(safe-area-inset-*) values resolve to non-zero — without it they are
		     always 0, so the safe-area padding on the FAB/sheets/top controls is a
		     no-op on notched iPhones. Edge-anchored controls add the insets in CSS. -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="theme-color" content="#0f766e" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Build It?" />
		<!-- Map tiles/sprite/glyphs come from openfreemap — warm the connection early so the
		     deferred MapLibre boot doesn't pay DNS+TLS setup cost on top of its own work. -->
		<link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
		<link rel="dns-prefetch" href="https://tiles.openfreemap.org" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
